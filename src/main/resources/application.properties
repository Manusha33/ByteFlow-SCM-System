# Connection to your Workbench database
spring.datasource.url=jdbc:mysql://localhost:3306/scm_inventory_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=#Mysqlroot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings (This will auto-create your tables later)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect